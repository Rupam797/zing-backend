# ===============================
# Application
# ===============================
spring.application.name=zing
server.port=8080

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zing_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Connection Pool (HikariCP)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# Security / JWT
# ===============================
jwt.secret=${JWT_SECRET:zing-secret-key-256-bit-length-for-hs256!!}
jwt.expiration=86400000

# ===============================
# WebSocket
# ===============================
spring.websocket.path=/ws

# ===============================
# Logging
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# CORS (for React Frontend)
# ===============================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# ===============================
# File Uploads (Food Images)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
cloudinary.url=${CLOUDINARY_URL:cloudinary://691283343634822:WHBa5WMDe4zrNIVaaRwvmoEdqm8@dlzh8gxsj}

# ===============================
# Dev Tools
# ===============================
spring.devtools.restart.enabled=true
